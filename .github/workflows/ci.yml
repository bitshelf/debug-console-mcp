name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        working-directory: mcp-rs
        run: cargo test --lib -- --test-threads=1
      - name: Build
        working-directory: mcp-rs
        run: cargo build --release
